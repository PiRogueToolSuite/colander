{% load i18n %}

<div class="btn-group" role="group">
  {% if "details" not in exclude %}
    <a href="{% url "device_monitoring_details_view" case_id=device_monitoring.case.id pk=device_monitoring.id %}" class="btn btn-primary {{ btn_class }}">
      <i class="nf nf-fa-eye"></i>
      {% translate "Details" %}
    </a>
  {% endif %}
  {% if "edit" not in exclude %}
    <a href="{% url "device_monitoring_update_view" case_id=device_monitoring.case.id pk=device_monitoring.id %}" class="btn btn-primary {{ btn_class }}">
      <i class="nf nf-fa-edit"></i>
      {% translate "Edit" %}
    </a>
  {% endif %}
  <a href="{% url "device_monitoring_delete_view" case_id=device_monitoring.case.id pk=device_monitoring.id %}"
     class="delete-entity-btn btn btn-danger text-white {{ btn_class }}"
     is="vue:ConfirmButton">
    <i class="nf nf-fa-trash"></i>
    Delete
  </a>
</div>
